name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  docs:
    name: Docs (mkdocs --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install docs tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[docs]"

      - name: Build site
        run: mkdocs build --strict

  capstone:
    name: Capstone (confirm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install capstone (dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e "./snakemake-capstone[dev]"

      - name: Confirm
        run: |
          make -C snakemake-capstone confirm
