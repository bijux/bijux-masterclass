site_name: Deep Dive Snakemake
site_description: Course book and reference workflow patterns for Snakemake.
site_author: Bijan Mousavi
site_url: https://bijux.github.io/deep-dive-snakemake/
repo_name: bijux/deep-dive-snakemake
repo_url: https://github.com/bijux/deep-dive-snakemake
edit_uri: edit/main/

docs_dir: course-book
site_dir: site

theme:
  name: material
  language: en
  logo: assets/bijux_logo_hq.png
  favicon: assets/bijux_icon.png
  features:
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search
  - macros:
      include_dir: .
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Modules:
      - "00 — Orientation": module-00.md
      - "01 — Rules & Contracts": module-01.md
      - "02 — Dynamic DAGs": module-02.md
      - "03 — Publishing & Verification": module-03.md
      - "04 — Profiles & Operations": module-04.md
  - Capstone:
      - "Reference Workflow": readme-capstone.md

extra:
  homepage: https://bijux.github.io/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bijux

copyright: "© 2025 Bijan Mousavi"
