INHERIT: ../../../mkdocs.shared.yml

site_name: Deep Dive Snakemake
site_description: Course book and reference workflow patterns for Snakemake.
site_author: Bijan Mousavi
site_url: https://bijux.github.io/deep-dive-series/reproducible-research/deep-dive-snakemake/
repo_name: bijux/deep-dive-series
repo_url: https://github.com/bijux/deep-dive-series
edit_uri: edit/master/courses/reproducible-research/deep-dive-snakemake/course-book/

docs_dir: course-book
site_dir: ../../../artifacts/site/reproducible-research/deep-dive-snakemake

plugins:
  - search
  - macros:
      include_dir: .
  - git-revision-date-localized:
      enable_creation_date: true
      type: timeago
  - minify:
      minify_html: true

nav:
  - Home: index.md
  - Modules:
      - "00 — Orientation": module-00.md
      - "01 — Rules & Contracts": module-01.md
      - "02 — Dynamic DAGs": module-02.md
      - "03 — Publishing & Verification": module-03.md
      - "04 — Profiles & Operations": module-04.md
  - Capstone:
      - "Reference Workflow": readme-capstone.md
