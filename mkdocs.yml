INHERIT: mkdocs.shared.yml

site_name: Bijux Masterclass
site_description: Unified catalog for the Bijux Masterclass program collection.
repo_name: bijux/bijux-masterclass
repo_url: https://github.com/bijux/bijux-masterclass

docs_dir: docs
site_dir: artifacts/site/bijux-masterclass

theme:
  custom_dir: docs/overrides

extra_css:
  - assets/styles/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@11.6.0/dist/mermaid.min.js
  - assets/javascripts/mermaid-init.js

nav:
  - Home: index.md
  - Reproducible Research:
      - Overview: reproducible-research/index.md
      - Deep Dive Make: reproducible-research/deep-dive-make.md
      - Deep Dive Snakemake: reproducible-research/deep-dive-snakemake.md
      - Deep Dive DVC: reproducible-research/deep-dive-dvc.md
  - Python Programming:
      - Overview: python-programming/index.md
      - Python Object-Oriented Programming: python-programming/python-object-oriented-programming.md
      - Python Functional Programming: python-programming/python-functional-programming.md
      - Python Meta-Programming: python-programming/python-meta-programming.md
