INHERIT: mkdocs.shared.yml

site_name: Bijux Masterclass
site_description: Unified catalog for the Bijux Masterclass program collection.
site_author: Bijan Mousavi <bijan@bijux.io>
site_url: !ENV [SITE_URL, https://bijux.io/bijux-masterclass/]
repo_name: bijux/bijux-masterclass
repo_url: https://github.com/bijux/bijux-masterclass
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: artifacts/site/bijux-masterclass
watch:
  - docs
  - docs/assets
  - docs/overrides
  - shared/bijux-docs
  - mkdocs.yml
  - mkdocs.shared.yml

extra:
  bijux:
    repository: bijux-masterclass
    nav_mode: default
    theme_key: bijux:theme
    hub_links:
      - key: bijux
        label: Bijux
        url: https://bijux.io/
      - key: bijux-core
        label: Core
        url: https://bijux.io/bijux-core/
      - key: bijux-canon
        label: Canon
        url: https://bijux.io/bijux-canon/
      - key: bijux-atlas
        label: Atlas
        url: https://bijux.io/bijux-atlas/
      - key: bijux-proteomics
        label: Proteomics
        url: https://bijux.io/bijux-proteomics/
      - key: bijux-pollenomics
        label: Pollenomics
        url: https://bijux.io/bijux-pollenomics/
      - key: bijux-masterclass
        label: Masterclass
        url: https://bijux.io/bijux-masterclass/

nav:
  - Home: index.md
  - Reproducible Research: reproducible-research/index.md
  - Python Programming: python-programming/index.md
