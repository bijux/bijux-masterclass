site_name: Python Meta-Programming
site_description: >-
  A correctness-first course-book on Python metaprogramming: introspection, decorators,
  descriptors, and metaclasses—without magical handwaving.
site_url: https://bijux.github.io/python-meta-programming/

repo_name: bijux/python-meta-programming
repo_url: https://github.com/bijux/python-meta-programming
edit_uri: edit/master/course-book/

docs_dir: course-book
site_dir: site

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

nav:
  - Home: index.md
  - Volume I:
      - "00 — Overview and Introduction": module-00.md
      - "01 — Everything Is an Object": module-01.md
      - "02 — Basic Introspection": module-02.md
      - "03 — The inspect Module": module-03.md
      - "04 — Decorators Level I": module-04.md
      - "05 — Decorators Level II": module-05.md
      - "06 — Class Decorators": module-06.md
      - "07 — Descriptors I": module-07.md
      - "08 — Descriptors II": module-08.md
      - "09 — Metaclasses": module-09.md
      - "10 — Responsibilities": module-10.md
      - "11 — Outro": module-11.md

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  homepage: https://bijux.github.io/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bijux

copyright: "© 2025 Bijan Mousavi"
