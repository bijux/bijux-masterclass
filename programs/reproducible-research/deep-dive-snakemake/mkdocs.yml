INHERIT: ../../../mkdocs.shared.yml

site_name: Deep Dive Snakemake
site_description: Ten-module Snakemake program guide and reference workflow from beginner to mastery.
site_author: Bijan Mousavi <bijan@bijux.io>
site_url: https://bijux.io/bijux-masterclass/reproducible-research/deep-dive-snakemake/
repo_name: bijux/bijux-masterclass
repo_url: https://github.com/bijux/bijux-masterclass
edit_uri: edit/master/programs/reproducible-research/deep-dive-snakemake/course-book/

docs_dir: course-book
site_dir: ../../../artifacts/site/reproducible-research/deep-dive-snakemake

theme:
  custom_dir: ../../../docs/overrides
  logo: ../../../docs/assets/bijux_logo_hq.png
  favicon: ../../../docs/assets/site-icons/favicon.ico

extra_css:
  - ../../../docs/assets/styles/extra.css

extra_javascript:
  - ../../../docs/assets/javascripts/vendor/mermaid-11.6.0.min.js
  - ../../../docs/assets/javascripts/mermaid-init.js

hooks:
  - ../../../docs/hooks/publish_site_assets.py

plugins:
  - search
  - macros:
      include_dir: .
  - minify:
      minify_html: true

