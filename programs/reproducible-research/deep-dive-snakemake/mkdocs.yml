      - Course Home: index.md
      - Learner Entry: start-here.md
      - Program Outline: module-00.md
      - Capstone Map: capstone-map.md
      - Capstone Overview: readme-capstone.md
  - "Module 01: File Contracts":
      - Overview: module-01.md
  - "Module 02: Dynamic DAGs":
      - Overview: module-02.md
  - "Module 03: Production Operation":
      - Overview: module-03.md
  - "Module 04: Scaling Boundaries":
      - Overview: module-04.md
  - "Module 05: Rule Boundaries":
      - Overview: module-05.md
  - "Module 06: Publish Contracts":
      - Overview: module-06.md
  - "Module 07: Workflow Architecture":
      - Overview: module-07.md
  - "Module 08: Operating Contexts":
      - Overview: module-08.md
  - "Module 09: Incident Response":
      - Overview: module-09.md
  - "Module 10: Mastery":
      - Overview: module-10.md
