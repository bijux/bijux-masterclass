name: Program Validation

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  actions: read
  pull-requests: read

concurrency:
  group: program-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  policy-gate:
    name: policy-prerequisites
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
      - name: Wait for policy and standards prerequisites
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          python3 .github/scripts/check_workflow_prerequisites.py

  validate:
    needs: policy-gate
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: series-site
            setup: |
              python -m pip install -U pip
            validate: |
              make series-docs-build
          - name: deep-dive-make
            setup: |
              python -m pip install -U pip
            validate: |
              make PROGRAM=reproducible-research/deep-dive-make docs-build
              make PROGRAM=reproducible-research/deep-dive-make test
          - name: deep-dive-snakemake
            setup: |
              python -m pip install -U pip
            validate: |
              make PROGRAM=reproducible-research/deep-dive-snakemake docs-build
              make -C programs/reproducible-research/deep-dive-snakemake/capstone bootstrap-confirm
          - name: deep-dive-dvc
            setup: |
              python -m pip install -U pip
            validate: |
              make PROGRAM=reproducible-research/deep-dive-dvc docs-build
              make PROGRAM=reproducible-research/deep-dive-dvc test
          - name: python-functional-programming
            setup: |
              python -m pip install -U pip
            validate: |
              make PROGRAM=python-programming/python-functional-programming docs-build
              make PROGRAM=python-programming/python-functional-programming test
          - name: python-object-oriented-programming
            setup: |
              python -m pip install -U pip
            validate: |
              make PROGRAM=python-programming/python-object-oriented-programming docs-build
              make PROGRAM=python-programming/python-object-oriented-programming test
          - name: python-meta-programming
            setup: |
              python -m pip install -U pip
            validate: |
              make PROGRAM=python-programming/python-meta-programming docs-build
              make PROGRAM=python-programming/python-meta-programming test
    name: ${{ matrix.name }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install prerequisites
        run: ${{ matrix.setup }}

      - name: Run validation
        run: ${{ matrix.validate }}
